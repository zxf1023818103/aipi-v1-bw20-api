name: Build and Publish Native Image (JDK 25)

on:
  push:
    branches:
      - master
      - dev
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    environment:
      name: prod
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Extract version from tag
        id: get_version
        env:
          GIT_BRANCH: ${{ github.ref_name }}
          FULL_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          VERSION=${GIT_BRANCH/\//-}-${FULL_SHA::7}
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Extracted version: $VERSION"

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if Image Exists
        id: check_image
        run: |
          if docker manifest inspect "${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ github.repository }}:${{ env.VERSION }}" > /dev/null 2>&1; then
            echo "IMAGE_EXISTS=true" >> $GITHUB_OUTPUT
          else
            echo "IMAGE_EXISTS=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout repository
        if: steps.check_image.outputs.IMAGE_EXISTS == 'false'
        uses: actions/checkout@v4
        with:
          fetch-depth: '0'

      - name: Set up JDK 25
        if: steps.check_image.outputs.IMAGE_EXISTS == 'false'
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'liberica'
          cache: 'gradle'

      - name: Build Local Image with Spring Boot
        if: steps.check_image.outputs.IMAGE_EXISTS == 'false'
        run: |
          ./gradlew bootBuildImage \
            --imageName=${{ env.REGISTRY }}/${{ github.repository }}:${{ env.VERSION }} \
            -P appVersion=${{ env.VERSION }} \
            -P appName=${{ github.event.repository.name }}

      - name: Tag and Push to GHCR
        if: steps.check_image.outputs.IMAGE_EXISTS == 'false'
        run: |
          docker tag ${{ env.REGISTRY }}/${{ github.repository }}:${{ env.VERSION }} ${{ env.REGISTRY }}/${{ github.repository }}:latest
          docker push ${{ env.REGISTRY }}/${{ github.repository }}:${{ env.VERSION }}
          docker push ${{ env.REGISTRY }}/${{ github.repository }}:latest

      - name: Get Image Digest
        id: get_image_digest
        run: |
          BUILD_DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' ${{ env.REGISTRY }}/${{ github.repository }}:${{ env.VERSION }} | cut -d'@' -f2)
          echo "Build Digest: $BUILD_DIGEST"
          echo "BUILD_DIGEST=$BUILD_DIGEST" >> $GITHUB_ENV

      - name: Setup Aliyun CLI
        if: github.ref_name == 'master'
        uses: aliyun/setup-aliyun-cli-action@v1

      - name: Setup Aliyun CLI Credentials
        if: github.ref_name == 'master'
        run: |
          aliyun plugin install --names aliyun-cli-fc
          
          aliyun configure set \
            --access-key-id ${{ vars.ALIYUN_ACCESS_KEY_ID }} \
            --access-key-secret ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }} \
            --region ${{ vars.ALIYUN_FC_REGION }} \
            --profile fc-deployer \
            --mode AK \
            --language en

      - name: Check Aliyun FC Running Image
        if: github.ref_name == 'master'
        id: check_aliyun_running_image
        run: |
          FUNCTION_INFO_JSON=$(aliyun fc GetFunction --functionName "${{ github.event.repository.name }}")
          echo "FUNCTION_INFO_JSON<<EOF" >> $GITHUB_OUTPUT
          echo "$FUNCTION_INFO_JSON" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          CURRENT_FC_IMAGE=$(echo $FUNCTION_INFO_JSON | jq -r '.customContainerConfig.image')
          echo CURRENT_FC_IMAGE=$CURRENT_FC_IMAGE >> $GITHUB_OUTPUT
          TARGET_FC_IMAGE="${{ env.REGISTRY }}/${{ github.repository }}:${{ env.VERSION }}"
          echo TARGET_FC_IMAGE=$TARGET_FC_IMAGE >> $GITHUB_OUTPUT

      - name: Deploy to Aliyun FC
        if: github.ref_name == 'master' && steps.check_aliyun_running_image.outputs.CURRENT_FC_IMAGE != steps.check_aliyun_running_image.outputs.TARGET_FC_IMAGE
        env:
          FUNCTION_INFO_JSON: ${{ steps.check_aliyun_running_image.outputs.FUNCTION_INFO_JSON }}
          TARGET_FC_IMAGE: ${{ steps.check_aliyun_running_image.outputs.TARGET_FC_IMAGE }}
        run: |
          UPDATE_FUNCTION_INPUT=$(echo $FUNCTION_INFO_JSON | jq -r '{customContainerConfig}' | jq -r --arg img "$TARGET_FC_IMAGE" '.customContainerConfig.image = $img' | jq -r 'del(.customContainerConfig.resolvedImageUri)' | jq -r '.customContainerConfig |= with_entries(select(.value != null and .value != {}))')
          echo UPDATE_FUNCTION_INPUT=$UPDATE_FUNCTION_INPUT
          FC_RESPONSE=$(aliyun fc UpdateFunction --functionName ${{ github.event.repository.name }} --body "$UPDATE_FUNCTION_INPUT")
          FC_DIGEST=$(echo "$FC_RESPONSE" | jq -r '.customContainerConfig.resolvedImageUri' | cut -d'@' -f2)
          echo "FC Digest: $FC_DIGEST"
          if [ "${{ env.BUILD_DIGEST }}" != "$FC_DIGEST" ]; then
            echo "::::::::::::::::::::::::::::::::::::::::::::::::::::::::"
            echo "❌ ERROR: Image Digest Mismatch!"
            echo "Expected (Build): ${{ env.BUILD_DIGEST }}"
            echo "Actual (Aliyun FC): $FC_DIGEST"
            echo "Possible cause: Latency in Registry syncing or Aliyun cache issues."
            echo "::::::::::::::::::::::::::::::::::::::::::::::::::::::::"
            exit 1
          else
            echo "✅ Digest Verification Successful!"
            echo "The production environment is confirmed to be running the latest image."
          fi
