name: Build and Publish Native Image (JDK 25)

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'liberica'
          cache: 'gradle'

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Native Image
        run: |
          ./gradlew bootBuildImage \
            --imageName=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            -PBP_JVM_VERSION=25 \
            -PBPL_JAVA_INSTALL_OPTIONS="-Xmx64m -Xms64m -XX:MaxDirectMemorySize=32m" \
            -PBP_NATIVE_IMAGE_BUILD_ARGUMENTS="-H:+UnlockExperimentalVMOptions -H:MaxRuntimeCompileMethods=500 --enable-native-access=ALL-UNNAMED"
          
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest