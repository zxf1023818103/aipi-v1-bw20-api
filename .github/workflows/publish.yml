name: Build and Publish Native Image (JDK 25)

on:
  push:
    tags:
      - 'v*' # 当推送 v1.0.0 这种标签时触发
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  # 清洗后的应用名，用于 Gradle 和 ARMS 服务名
  CLEAN_APP_NAME: ${{ github.event.repository.name }}

jobs:
  build-and-push:
    environment:
      name: prod
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show Version
        run: echo "Current version is ${{ github.ref_name }}"

      - name: Extract version from tag
        id: get_version
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Extracted version: $VERSION"

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'liberica'
          cache: 'gradle'

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Local Image with Spring Boot
        run: |
          ./gradlew bootBuildImage \
            --imageName=local-build-image:${{ env.VERSION }} \
            -P appVersion=${{ env.VERSION }} \
            -P appName=${{ env.CLEAN_APP_NAME }}

      - name: Tag and Push to GHCR
        run: |
          GHCR_IMAGE_NAME=ghcr.io/${{ github.repository }}
          docker tag local-build-image:${{ env.VERSION }} $GHCR_IMAGE_NAME:${{ env.VERSION }}
          docker tag local-build-image:${{ env.VERSION }} $GHCR_IMAGE_NAME:latest
          docker push $GHCR_IMAGE_NAME:${{ env.VERSION }}
          docker push $GHCR_IMAGE_NAME:latest
          echo "GHCR_IMAGE_NAME=$GHCR_IMAGE_NAME" >> $GITHUB_ENV
          BUILD_DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' $GHCR_IMAGE_NAME:${{ env.VERSION }} | cut -d'@' -f2)
          echo "Build Digest: $BUILD_DIGEST"
          echo "BUILD_DIGEST=$BUILD_DIGEST" >> $GITHUB_ENV

      - name: Tag and Push to Docker Hub
        run: |
          DOCKERHUB_IMAGE_NAME=docker.io/${{ vars.DOCKERHUB_USERNAME }}/${{ env.CLEAN_APP_NAME }}
          docker tag local-build-image:${{ env.VERSION }} $DOCKERHUB_IMAGE_NAME:${{ env.VERSION }}
          docker tag local-build-image:${{ env.VERSION }} $DOCKERHUB_IMAGE_NAME:latest
          docker push $DOCKERHUB_IMAGE_NAME:${{ env.VERSION }}
          docker push $DOCKERHUB_IMAGE_NAME:latest
          echo "DOCKERHUB_IMAGE_NAME=$DOCKERHUB_IMAGE_NAME" >> $GITHUB_ENV
