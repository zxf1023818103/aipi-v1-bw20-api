name: Deploy to Aliyun FC
on:
  push:
    branches:
      - 'master'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # 清洗后的应用名，用于 Gradle 和 ARMS 服务名
  CLEAN_APP_NAME: ${{ github.event.repository.name }}

jobs:
  deploy:
    environment:
      name: prod
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract Version from Tag
        run: |
          git fetch origin master
          TAG=$(git tag --points-at origin/master)
          if [ -z "$TAG" ]; then
            echo "No tag found on the tip of the default branch. Skipping deployment."
            exit 1
          else
            echo "Found tag $TAG. Proceeding with deployment..."
            VERSION=${TAG#v}
            echo "VERSION=$VERSION" >> $GITHUB_ENV
            echo "Extracted version: $VERSION"
          fi

      - name: Setup Aliyun CLI
        uses: aliyun/setup-aliyun-cli-action@v1

      - name: Setup Aliyun CLI Credentials
        run: |
          aliyun plugin install --names aliyun-cli-fc

          aliyun configure set \
            --access-key-id ${{ vars.ALIYUN_ACCESS_KEY_ID }} \
            --access-key-secret ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }} \
            --region ${{ vars.ALIYUN_FC_REGION }} \
            --profile fc-deployer \
            --mode AK \
            --language en

      - name: Deploy to Aliyun FC
        run: |
          GHCR_IMAGE_NAME=ghcr.io/${{ github.repository }}
          IMAGE_NAME=$GHCR_IMAGE_NAME:${{ env.VERSION }}
          UPDATE_FUNCTION_INPUT=$(aliyun fc GetFunction --functionName ${{ env.CLEAN_APP_NAME }} | jq -c '{customContainerConfig}' | jq -c --arg img "$IMAGE_NAME" '.customContainerConfig.image = $img' | jq -c 'del(.customContainerConfig.resolvedImageUri)' | jq -c '.customContainerConfig |= with_entries(select(.value != null and .value != {}))')
          echo \$UPDATE_FUNCTION_INPUT=$UPDATE_FUNCTION_INPUT
          FC_RESPONSE=$(aliyun fc UpdateFunction --functionName ${{ env.CLEAN_APP_NAME }} --body "$UPDATE_FUNCTION_INPUT")
          FC_DIGEST=$(echo "$FC_RESPONSE" | jq -r '.customContainerConfig.resolvedImageUri' | cut -d'@' -f2)
          if [ -n $FC_DIGEST ]; then
            echo "FC Digest: $FC_DIGEST"
          else
            exit 1
          fi
